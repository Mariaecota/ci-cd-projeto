name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest   # <- aqui garantimos que o pytest sempre será instalado

      - name: Rodar testes
        run: pytest -q   # <- aqui tiramos o "|| echo...", assim falha se o teste falhar
name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest   # <- aqui garantimos que o pytest sempre será instalado

      - name: Rodar testes
        run: pytest -q   # <- aqui tiramos o "|| echo...", assim falha se o teste falhar
deploy:
    runs-on: ubuntu-latest
    needs: test  # Isso diz para o GitHub: "Só faça essa tarefa se a de 'test' passar!"
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: A nova tarefa de entrega (deploy)
        run: echo "Aqui é onde a sua aplicação seria entregue."
